    <title>제9회 경상북도 후보군 현황</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; scroll-behavior: smooth; padding-bottom: 50px; }
        
        /* 정당 배지 */
        .party-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; color: white; display: inline-block; }
        .party-dp { background-color: #004EA2; } /* 더불어민주당 */
        .party-ppp { background-color: #E61E2B; } /* 국민의힘 */
        .party-rkp { background-color: #0033A0; } /* 조국혁신당 */
        .party-rp { background-color: #FF7210; } /* 개혁신당 */
        .party-pv { background-color: #D6001C; } /* 진보당 */
        .party-indie { background-color: #64748b; } /* 무소속 / 기타정당 */

        /* 상태 태그 */
        .status-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 800; border: 1px solid transparent; }
        .status-nominated { background-color: #dcfce7; color: #15803d; border-color: #bbf7d0; }
        .status-primary { background-color: #fef9c3; color: #a16207; border-color: #fef08a; }
        .status-withdrawn { background-color: #fee2e2; color: #b91c1c; border-color: #fecaca; }
        .status-cutoff { background-color: #f1f5f9; color: #475569; border-color: #e2e8f0; }
        .status-expected { background-color: #f8fafc; color: #64748b; border-color: #e2e8f0; }

        /* 지역 선택 버튼 및 지도 경로 */
        .region-btn { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }
        .region-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .region-btn.active { 
            border-color: #0f172a; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            transform: scale(1.05);
            z-index: 10;
        }

        /* 지도 스타일링 및 줌/팬 */
        #map-wrapper {
            position: relative;
            width: 100%;
            height: 280px; /* 모바일에서 기본 높이 축소 */
            background-color: #f8fafc;
            border-radius: 1rem;
            overflow: hidden;
            cursor: grab;
            touch-action: none;
        }
        @media (min-width: 1024px) {
            #map-wrapper { height: 500px; } /* 데스크톱에서 높이 복구 */
        }
        #map-wrapper:active { cursor: grabbing; }
        
        #map-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: center;
            transition: transform 0.1s ease-out;
        }
        #map-container svg {
            width: 100%;
            height: 100%;
            max-width: none;
            max-height: none;
        }

        path {
            cursor: pointer;
            transition: stroke-width 0.2s ease, filter 0.2s ease;
            stroke: #fff;
            stroke-width: 1;
        }
        path:hover {
            filter: brightness(0.85);
            stroke-width: 2;
            stroke: #333;
        }
        path.active-region {
            stroke: #000;
            stroke-width: 3;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.3));
        }

        /* 줌 컨트롤 UI */
        .map-controls {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            z-index: 20;
        }
        .control-btn {
            width: 32px;
            height: 32px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: bold;
            color: #475569;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        /* 후보 카드 */
        .candidate-card { transition: all 0.2s ease; border-left-width: 6px; }
        .is-out { opacity: 0.6; filter: grayscale(0.4); }
        .strikethrough { text-decoration: line-through; color: #94a3b8; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

                { name: "정성환", party: "더불어민주당", status: "공천", info: "전 울릉군의회 의장" },

                { name: "남진복", party: "국민의힘", status: "예상", info: "현 경북도의원" },
                { name: "남한권", party: "무소속", status: "예상", info: "현 울릉군수" }
            ]

        const partyColors = {
            "더불어민주당": "#004EA2",
            "국민의힘": "#E61E2B",
            "조국혁신당": "#0033A0",
            "개혁신당": "#FF7210",
            "진보당": "#D6001C",
            "무소속": "#64748b",
            "기타정당": "#64748b"
        };

        const partyClasses = {
            "더불어민주당": "party-dp",
            "국민의힘": "party-ppp",
            "조국혁신당": "party-rkp",
            "개혁신당": "party-rp",
            "진보당": "party-pv",
            "무소속": "party-indie",
            "기타정당": "party-indie"
        };

        let mapState = {
            scale: 1,
            translateX: 0,
            translateY: 0,
            isDragging: false,
            startX: 0,
            startY: 0
        };

        function getPartyCategory(partyName) {
            const majorParties = ["더불어민주당", "국민의힘", "조국혁신당", "개혁신당", "진보당", "무소속"];
            if (majorParties.includes(partyName)) return partyName;
            return "기타정당";
        }

        function getDominantParty(region) {
            const regionData = electionData[region];
            if (!regionData) return "무소속";
            const active = regionData.filter(c => c.status !== "사퇴" && c.status !== "컷오프");
            if (active.length === 0) return "무소속";
            const counts = {};
            active.forEach(c => {
                const category = getPartyCategory(c.party);
                counts[category] = (counts[category] || 0) + 1;
            });
            let dominant = "국민의힘", max = -1;
            ["국민의힘", "더불어민주당", "무소속", "조국혁신당", "개혁신당", "진보당", "기타정당"].forEach(p => {
                if ((counts[p] || 0) > max) { max = counts[p]; dominant = p; }
            });
            return dominant;
        }

        async function loadMap() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/statgarten/maps/8247e23ded70eb908a61dbe2b3db07599b4a21cc/svg/simple/%EA%B2%BD%EC%83%81%EB%B6%81%EB%8F%84_%EC%8B%9C%EA%B5%B0%EA%B5%AC_%EA%B2%BD%EA%B3%84.svg');
                let svgText = await response.text();
                const container = document.getElementById('map-container');
                container.innerHTML = svgText;
                const svg = container.querySelector('svg');
                svg.setAttribute('viewBox', '0 0 800 1000');
                
                const paths = svg.querySelectorAll('path');
                paths.forEach(path => {
                    const name = path.getAttribute('id') || path.getAttribute('class') || '';
                    let matchedRegion = null;
                    Object.keys(electionData).forEach(regionKey => {
                        if (name.includes(regionKey.replace('시', '').replace('군', ''))) matchedRegion = regionKey;
                    });

                    if (matchedRegion) {
                        path.style.fill = partyColors[getDominantParty(matchedRegion)];
                        path.setAttribute('data-region', matchedRegion);
                        path.onclick = (e) => {
                            if (!mapState.hasMoved) selectRegion(matchedRegion);
                        };
                        const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
                        title.textContent = matchedRegion;
                        path.appendChild(title);
                    } else {
                        path.style.fill = "#e2e8f0";
                    }
                });

                initRegionGrid();
                initMapInteractions();
                selectRegion("포항시");
            } catch (error) {
                console.error("지도 로딩 실패:", error);
                document.getElementById('loading-map').innerText = "지도를 불러올 수 없습니다.";
            }
        }

        function initMapInteractions() {
            const wrapper = document.getElementById('map-wrapper');
            const container = document.getElementById('map-container');

            wrapper.onwheel = (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                handleZoom(delta);
            };

            wrapper.onmousedown = (e) => {
                mapState.isDragging = true;
                mapState.hasMoved = false;
                mapState.startX = e.clientX - mapState.translateX;
                mapState.startY = e.clientY - mapState.translateY;
            };

            window.onmousemove = (e) => {
                if (!mapState.isDragging) return;
                mapState.hasMoved = true;
                mapState.translateX = e.clientX - mapState.startX;
                mapState.translateY = e.clientY - mapState.startY;
                updateMapTransform();
            };

            window.onmouseup = () => { mapState.isDragging = false; };

            wrapper.ontouchstart = (e) => {
                const touch = e.touches[0];
                mapState.isDragging = true;
                mapState.hasMoved = false;
                mapState.startX = touch.clientX - mapState.translateX;
                mapState.startY = touch.clientY - mapState.translateY;
            };

            wrapper.ontouchmove = (e) => {
                if (!mapState.isDragging) return;
                const touch = e.touches[0];
                mapState.hasMoved = true;
                mapState.translateX = touch.clientX - mapState.startX;
                mapState.translateY = touch.clientY - mapState.startY;
                updateMapTransform();
            };

            wrapper.ontouchend = () => { mapState.isDragging = false; };
        }

        function handleZoom(delta) {
            const newScale = Math.min(Math.max(mapState.scale + delta, 0.5), 5);
            mapState.scale = newScale;
            updateMapTransform();
        }

        function updateMapTransform() {
            const container = document.getElementById('map-container');
            container.style.transform = `translate(${mapState.translateX}px, ${mapState.translateY}px) scale(${mapState.scale})`;
        }

        function resetMap() {
            mapState = { scale: 1, translateX: 0, translateY: 0, isDragging: false, startX: 0, startY: 0 };
            updateMapTransform();
        }

        function initRegionGrid() {
            const grid = document.getElementById('region-grid');
            grid.innerHTML = '';
            Object.keys(electionData).sort().forEach(region => {
                const btn = document.createElement('button');
                btn.className = `region-btn p-3 rounded-2xl text-white font-black text-sm shadow-sm flex items-center justify-center text-center leading-tight`;
                btn.style.backgroundColor = partyColors[getDominantParty(region)];
                btn.innerHTML = region;
                btn.dataset.name = region;
                btn.onclick = () => selectRegion(region);
                grid.appendChild(btn);
            });
        }

        function selectRegion(name) {
            document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(document.querySelectorAll('.region-btn')).find(b => b.dataset.name === name);
            if (activeBtn) activeBtn.classList.add('active');

            document.querySelectorAll('#map-container path').forEach(p => p.classList.remove('active-region'));
            const activePath = Array.from(document.querySelectorAll('#map-container path')).find(p => p.getAttribute('data-region') === name);
            if (activePath) activePath.classList.add('active-region');

            document.getElementById('selected-title').innerText = name;
            const list = document.getElementById('candidate-list');
            list.innerHTML = '';
            const candidates = electionData[name] || [];
            if (candidates.length === 0) {
                list.innerHTML = '<div class="text-center py-20 text-slate-400 font-bold">데이터가 없습니다.</div>';
                return;
            }
            const validCount = candidates.filter(c => c.status !== "사퇴" && c.status !== "컷오프").length;
            document.getElementById('region-stats').innerText = `유효 후보 ${validCount}명`;

            candidates.forEach(c => {
                const isOut = c.status === "사퇴" || c.status === "탈락" || c.status === "컷오프";
                const isNominated = c.status === "공천";
                const card = document.createElement('div');
                const category = getPartyCategory(c.party);
                card.className = `candidate-card bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col gap-2 
                                  ${isOut ? 'is-out' : ''} ${isNominated ? 'ring-2 ring-green-500 bg-green-50/30' : ''}`;
                card.style.borderLeftColor = isOut ? "#cbd5e1" : (partyColors[category] || "#64748b");
                const statusClass = isNominated ? 'status-nominated' : (c.status === '경선' ? 'status-primary' : (isOut ? 'status-withdrawn' : 'status-expected'));

                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="party-badge ${partyClasses[category] || 'party-indie'}">${c.party}</span>
                        <span class="status-tag ${statusClass}">${isNominated ? '공천 확정' : c.status}</span>
                    </div>
                    <div>
                        <h4 class="text-lg font-black ${isOut ? 'strikethrough' : 'text-slate-800'}">${c.name}</h4>
                        <p class="text-[11px] font-semibold text-slate-500 mt-0.5">${c.info || '정보 없음'}</p>
                    </div>
                `;
                list.appendChild(card);
            });

            if (window.innerWidth < 1024) document.getElementById('detail-view').scrollIntoView({ behavior: 'smooth' });
        }

        window.onload = loadMap;
    </script>
